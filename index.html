<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snooker Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ SETUP ═══ -->
<div id="screen-setup" class="screen active">
  <div class="setup-container">
    <div class="setup-logo">
      <div class="logo-ball"></div>
      <h1>Snooker Tracker</h1>
    </div>
    <div class="form-group">
      <label for="player1-name">Player 1</label>
      <input type="text" id="player1-name" placeholder="Enter name" maxlength="20" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="player2-name">Player 2</label>
      <input type="text" id="player2-name" placeholder="Enter name" maxlength="20" autocomplete="off">
    </div>
    <button class="btn-primary" onclick="startMatch()">Start Match</button>
    <button class="btn-secondary" onclick="showHistory()">View History</button>
  </div>
</div>

<!-- ═══ GAME ═══ -->
<div id="screen-game" class="screen">
  <div class="game-container">

    <!-- Header -->
    <div class="match-header">
      <button class="btn-icon" onclick="confirmAbandon()">&#10005;</button>
      <div class="header-center">
        <span id="frame-label" class="frame-label">Frame 1</span>
        <div class="frames-score">
          <span id="p1-frames">0</span>
          <span class="frames-dash">–</span>
          <span id="p2-frames">0</span>
        </div>
      </div>
      <div style="width:36px"></div>
    </div>

    <!-- Score Panel -->
    <div class="score-panel">
      <div class="player-card" id="player-0-panel">
        <div class="player-name" id="p1-name-display">Player 1</div>
        <div class="player-meta">
          <div class="meta-item"><span class="meta-label">Break</span><span class="meta-value" id="p1-break">0</span></div>
          <div class="meta-item"><span class="meta-label">Best</span><span class="meta-value" id="p1-best">0</span></div>
        </div>
      </div>
      <div class="score-divider"></div>
      <div class="player-card" id="player-1-panel">
        <div class="player-name" id="p2-name-display">Player 2</div>
        <div class="player-meta">
          <div class="meta-item"><span class="meta-label">Break</span><span class="meta-value" id="p2-break">0</span></div>
          <div class="meta-item"><span class="meta-label">Best</span><span class="meta-value" id="p2-best">0</span></div>
        </div>
      </div>
    </div>

    <!-- Active bar -->
    <div class="active-bar">
      <div class="active-indicator"></div>
      <span id="current-player-label">Player 1's turn</span>
      <span id="phase-label" class="phase-label">15 reds on table</span>
      <span id="pts-remaining" class="pts-remaining">147 pts left</span>
    </div>

    <!-- Ball Buttons -->
    <div class="balls-section">
      <div id="ball-buttons" class="ball-buttons"></div>
    </div>

    <!-- Foul Panel -->
    <div id="foul-panel" class="foul-panel hidden">
      <div class="foul-header">
        <span class="foul-title">Foul — award points to opponent</span>
      </div>
      <div class="foul-grid">
        <button class="foul-btn foul-4" onclick="applyFoul(4)"><span class="foul-val">4</span></button>
        <button class="foul-btn foul-5" onclick="applyFoul(5)"><span class="foul-val">5</span></button>
        <button class="foul-btn foul-6" onclick="applyFoul(6)"><span class="foul-val">6</span></button>
        <button class="foul-btn foul-7" onclick="applyFoul(7)"><span class="foul-val">7</span></button>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn-action btn-foul" onclick="showFoulPanel()">Foul</button>
      <button class="btn-action btn-miss" onclick="endBreak()">Miss / Safety</button>
      <button class="btn-action btn-switch" onclick="switchPlayer()" title="Switch player">&#8644;</button>
      <button class="btn-action btn-undo" onclick="undoLastBall()" title="Undo">&#8617;</button>
    </div>

    <!-- Frame controls -->
    <div class="frame-row">
      <button class="btn-frame-end" onclick="confirmEndFrame()">End Frame</button>
      <button class="btn-concede" onclick="confirmConcede()">Concede</button>
      <button class="btn-correct" onclick="showCorrectPanel()">Correct</button>
    </div>

    <!-- Correction Panel -->
    <div id="correct-panel" class="correct-panel hidden">
      <div class="correct-header">
        <span class="correct-title">Frame Correction</span>
      </div>
      <div class="correct-body">
        <div class="correct-row">
          <span class="correct-label">Reds on table</span>
          <div class="correct-btns">
            <button class="corr-btn corr-remove" onclick="applyCorrection('remove-red')">&#8722;</button>
            <span id="corr-reds" class="corr-val">15</span>
            <button class="corr-btn corr-add" onclick="applyCorrection('add-red')">+</button>
          </div>
        </div>
        <div class="correct-row">
          <span id="corr-cur-name" class="correct-label">Player score:</span>
          <div class="correct-btns">
            <button class="corr-btn corr-remove" onclick="applyCorrection('remove-pt')">&#8722;</button>
            <span id="corr-cur-score" class="corr-val">0</span>
            <button class="corr-btn corr-add" onclick="applyCorrection('add-pt')">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Miss difficulty picker -->
    <div id="miss-picker" class="miss-picker hidden">
      <div class="miss-picker-header">
        <span id="miss-who-label">How difficult was the miss?</span>
        <span id="miss-countdown" class="miss-countdown">10s</span>
      </div>
      <div class="miss-picker-btns">
        <button class="miss-btn miss-easy"   onclick="selectMissDifficulty('easy')">Easy</button>
        <button class="miss-btn miss-medium" onclick="selectMissDifficulty('medium')">Medium</button>
        <button class="miss-btn miss-hard"   onclick="selectMissDifficulty('hard')">Hard</button>
      </div>
    </div>

    <!-- Live frame log -->
    <div class="frame-log-section">
      <div class="frame-log-header">Frame Log</div>
      <div id="frame-log-list" class="frame-log-list"></div>
    </div>

  </div>
</div>

<!-- ═══ HISTORY ═══ -->
<div id="screen-history" class="screen">
  <div class="history-container">
    <div class="history-header">
      <button class="btn-back" onclick="showSetup()">&#8592; Back</button>
      <h2>History</h2>
      <button class="btn-clear-hist" onclick="confirmClearHistory()">Clear</button>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>
</div>

<!-- ═══ FRAME SUMMARY OVERLAY ═══ -->
<div id="frame-summary-overlay" class="overlay hidden">
  <div class="overlay-card">
    <div id="fs-title" class="fs-title">Frame 1</div>
    <div id="fs-score" class="fs-score">0 – 0</div>
    <div id="fs-frames" class="fs-frames">Frames: 0 – 0</div>
    <div id="fs-stats" class="fs-stats-block"></div>
    <div class="fs-buttons">
      <button class="btn-primary" onclick="startNextFrame()">Start Next Frame</button>
      <button class="btn-secondary" onclick="endMatchFromSummary()">End Match</button>
    </div>
  </div>
</div>

<!-- ═══ CONFIRM DIALOG ═══ -->
<div id="confirm-dialog" class="dialog-overlay hidden">
  <div class="dialog">
    <p id="confirm-message"></p>
    <div class="dialog-buttons">
      <button class="btn-dialog-yes" id="confirm-yes-btn">Confirm</button>
      <button class="btn-dialog-no" onclick="hideConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
