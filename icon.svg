<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="ball-shadow" cx="68%" cy="68%" r="60%" fx="68%" fy="68%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ball-body" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#e83010"/>
      <stop offset="55%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#7a0a00"/>
    </radialGradient>
    <linearGradient id="felt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <!-- Felt background -->
  <rect width="512" height="512" rx="100" fill="#1a6b34"/>
  <rect width="512" height="512" rx="100" fill="url(#felt-grad)"/>
  <!-- Ball shadow on felt -->
  <ellipse cx="268" cy="330" rx="126" ry="16" fill="#000" opacity="0.28"/>
  <!-- Red ball -->
  <circle cx="256" cy="238" r="150" fill="url(#ball-body)"/>
  <circle cx="256" cy="238" r="150" fill="url(#ball-shadow)"/>
  <!-- Specular highlight -->
  <ellipse cx="190" cy="167" rx="64" ry="50" fill="rgba(255,255,255,0.54)" transform="rotate(-22 190 167)"/>
  <ellipse cx="208" cy="183" rx="32" ry="24" fill="rgba(255,255,255,0.30)" transform="rotate(-22 208 183)"/>
</svg>
